name: Compliance

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  compliance:
    name: YAML 1.2 Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Run compliance tests
        id: compliance
        run: |
          pnpm vitest run --project compliance --reporter=json > /tmp/compliance-results.json 2>/dev/null || true

          node --input-type=module <<'SCRIPT'
          import { readFileSync, writeFileSync } from "node:fs";

          // Load skip maps to identify expected failures
          const skipMapPath = "__test__/utils/yaml-test-suite-skip-map.ts";
          const skipMapSrc = readFileSync(skipMapPath, "utf-8");

          // Extract XFAIL test IDs (parse-level expected failures)
          const xfailIds = new Set();
          const xfailMatch = skipMapSrc.match(/export const XFAIL[^{]*\{([^]*?)\n\};/);
          if (xfailMatch) {
            for (const m of xfailMatch[1].matchAll(/^\t+["']?([^"'\s:]+)["']?\s*:/gm)) {
              xfailIds.add(m[1]);
            }
          }

          // Extract SKIP_ASSERTIONS entries
          const skipAssertions = {};
          const skipMatch = skipMapSrc.match(/export const SKIP_ASSERTIONS[^{]*\{([^]*?)\n\};/);
          if (skipMatch) {
            for (const m of skipMatch[1].matchAll(/["']?([^"'\s:]+)["']?\s*:\s*\[([^\]]+)\]/g)) {
              skipAssertions[m[1]] = m[2];
            }
          }

          const data = JSON.parse(readFileSync("/tmp/compliance-results.json", "utf-8"));
          const results = data.testResults[0].assertionResults;

          // Extract test ID from ancestorTitles like "[229Q] ..." or "[3RLN/01] ..."
          function getTestId(r) {
            const ancestor = r.ancestorTitles.find(t => /^\[.+\]/.test(t));
            if (!ancestor) return null;
            const match = ancestor.match(/^\[([^\]]+)\]/);
            return match ? match[1] : null;
          }

          // Parse-level: tests where parse succeeds/fails correctly
          const parseTests = results.filter(r =>
            r.title === "should parse successfully" || r.title === "should reject invalid YAML"
          );
          const parseTotal = parseTests.length;
          const parsePassing = parseTests.filter(r => {
            const id = getTestId(r);
            return r.status === "passed" && !xfailIds.has(id);
          }).length;
          const parsePercentage = Math.round((parsePassing / parseTotal) * 100);

          // Full compliance: all assertions, excluding expected failures
          const total = results.length;
          const passed = results.filter(r => {
            const id = getTestId(r);
            if (xfailIds.has(id)) return false;
            if (skipAssertions[id]) {
              if (r.title.includes("JSON") && skipAssertions[id].includes("json")) return false;
              if (r.title.includes("canonical") && skipAssertions[id].includes("output")) return false;
              if (r.title.includes("roundtrip") && skipAssertions[id].includes("roundtrip")) return false;
            }
            return r.status === "passed";
          }).length;
          const fullPercentage = Math.round((passed / total) * 100);

          function color(pct) {
            if (pct > 90) return "brightgreen";
            if (pct > 70) return "yellow";
            if (pct > 50) return "orange";
            return "red";
          }

          const badge = {
            parse: {
              passing: parsePassing,
              total: parseTotal,
              percentage: parsePercentage,
              color: color(parsePercentage),
            },
            full: {
              passing: passed,
              total,
              percentage: fullPercentage,
              color: color(fullPercentage),
            },
            lastUpdated: new Date().toISOString(),
          };

          writeFileSync("/tmp/compliance.json", JSON.stringify(badge, null, 2) + "\n");
          console.log(`Parse: ${parsePassing}/${parseTotal} (${parsePercentage}%)`);
          console.log(`Full:  ${passed}/${total} (${fullPercentage}%)`);
          SCRIPT

      - name: Update badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create badges branch from current main HEAD so GitHub
          # doesn't show a "Compare & pull request" banner for it
          git checkout -B badges HEAD

          # Remove all tracked files, add only compliance.json
          git rm -rf . 2>/dev/null || true
          git checkout HEAD -- .gitignore 2>/dev/null || true
          cp /tmp/compliance.json compliance.json
          git add compliance.json
          git commit -m "chore: update compliance badge data"
          git push origin badges --force
