name: Compliance

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  compliance:
    name: YAML 1.2 Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Run compliance tests
        id: compliance
        run: |
          RAW_COMPLIANCE=1 pnpm vitest run --project compliance-raw --reporter=json > /tmp/compliance-raw-results.json 2>/dev/null || true

          node --input-type=module <<'SCRIPT'
          import { readFileSync, writeFileSync } from "node:fs";

          const raw = JSON.parse(readFileSync("/tmp/compliance-raw-results.json", "utf-8"));
          const rawResults = raw.testResults[0].assertionResults;

          // Parse-level: raw parse/reject assertions (no it.fails inflation)
          const parseTests = rawResults.filter(r =>
            r.title === "should parse successfully" || r.title === "should reject invalid YAML"
          );
          const parsePassing = parseTests.filter(r => r.status === "passed").length;
          const parseTotal = parseTests.length;
          const parsePercentage = Math.round((parsePassing / parseTotal) * 100);

          // Full compliance: raw unfiltered results against all assertions
          const rawPassing = rawResults.filter(r => r.status === "passed").length;
          const rawTotal = rawResults.length;
          const fullPercentage = Math.round((rawPassing / rawTotal) * 100);

          function color(pct) {
            if (pct > 90) return "brightgreen";
            if (pct > 70) return "yellow";
            if (pct > 50) return "orange";
            return "red";
          }

          const badge = {
            parse: {
              passing: parsePassing,
              total: parseTotal,
              percentage: parsePercentage,
              color: color(parsePercentage),
            },
            full: {
              passing: rawPassing,
              total: rawTotal,
              percentage: fullPercentage,
              color: color(fullPercentage),
            },
            lastUpdated: new Date().toISOString(),
          };

          // shields.io endpoint badge format
          const parseBadge = {
            schemaVersion: 1,
            label: "YAML 1.2 parse",
            message: `${parsePercentage}%`,
            color: color(parsePercentage),
          };

          const fullBadge = {
            schemaVersion: 1,
            label: "YAML 1.2 full",
            message: `${fullPercentage}%`,
            color: color(fullPercentage),
          };

          writeFileSync("/tmp/compliance.json", JSON.stringify(badge, null, 2) + "\n");
          writeFileSync("/tmp/parse-badge.json", JSON.stringify(parseBadge, null, 2) + "\n");
          writeFileSync("/tmp/full-badge.json", JSON.stringify(fullBadge, null, 2) + "\n");
          console.log(`Parse: ${parsePassing}/${parseTotal} (${parsePercentage}%)`);
          console.log(`Full:  ${rawPassing}/${rawTotal} (${fullPercentage}%)`);
          SCRIPT

      - name: Update badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create badges branch from current main HEAD so GitHub
          # doesn't show a "Compare & pull request" banner for it
          git checkout -B badges HEAD

          # Remove all tracked files, add badge data
          git rm -rf . 2>/dev/null || true
          git checkout HEAD -- .gitignore 2>/dev/null || true
          cp /tmp/compliance.json compliance.json
          cp /tmp/parse-badge.json parse-badge.json
          cp /tmp/full-badge.json full-badge.json
          git add compliance.json parse-badge.json full-badge.json
          git commit -m "chore: update compliance badge data"
          git push origin badges --force
