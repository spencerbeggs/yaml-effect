name: Compliance

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  compliance:
    name: YAML 1.2 Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup runtime
        id: runtime
        uses: savvy-web/workflow-runtime-action@main

      - name: Run compliance tests
        id: compliance
        run: |
          RAW_COMPLIANCE=1 pnpm vitest run --project yaml-effect:e2e --reporter=json > /tmp/compliance-raw-results.json 2>/dev/null || true

          node --input-type=module <<'SCRIPT'
          import { readFileSync, writeFileSync } from "node:fs";

          // Extract JSON from output (agent reporter may append non-JSON text)
          const rawText = readFileSync("/tmp/compliance-raw-results.json", "utf-8");
          const jsonStart = rawText.indexOf("{");
          let depth = 0;
          let jsonEnd = jsonStart;
          for (let i = jsonStart; i < rawText.length; i++) {
            if (rawText[i] === "{") depth++;
            else if (rawText[i] === "}") { depth--; if (depth === 0) { jsonEnd = i + 1; break; } }
          }
          const raw = JSON.parse(rawText.slice(jsonStart, jsonEnd));

          // Full compliance: only the raw (unfiltered) test file. The
          // filtered file uses it.fails for XFAIL entries, which vitest
          // reports as "passed" when the assertion fails — including those
          // would inflate the score, so we exclude them entirely.
          const rawFile = raw.testResults.find(r => r.name.includes("yaml-test-suite-raw"));
          const rawResults = rawFile.assertionResults;
          const passing = rawResults.filter(r => r.status === "passed").length;
          const total = rawResults.length;
          const percentage = Math.floor((passing / total) * 100);

          function color(pct) {
            if (pct > 90) return "brightgreen";
            if (pct > 70) return "yellow";
            if (pct > 50) return "orange";
            return "red";
          }

          const data = {
            passing,
            total,
            percentage,
            color: color(percentage),
            lastUpdated: new Date().toISOString(),
          };

          // shields.io endpoint badge format
          const badge = {
            schemaVersion: 1,
            label: "YAML 1.2 compliance",
            message: `${percentage}%`,
            color: color(percentage),
          };

          writeFileSync("/tmp/compliance.json", JSON.stringify(data, null, 2) + "\n");
          writeFileSync("/tmp/badge.json", JSON.stringify(badge, null, 2) + "\n");
          console.log(`Compliance: ${passing}/${total} (${percentage}%)`);
          SCRIPT

      - name: Update badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create badges branch from current main HEAD so GitHub
          # doesn't show a "Compare & pull request" banner for it
          git checkout -B badges HEAD

          # Remove all tracked files, add badge data
          git rm -rf . 2>/dev/null || true
          git checkout HEAD -- .gitignore 2>/dev/null || true
          cp /tmp/compliance.json compliance.json
          cp /tmp/badge.json badge.json
          git add compliance.json badge.json
          git commit -m "chore: update compliance badge data"
          git push origin badges --force
