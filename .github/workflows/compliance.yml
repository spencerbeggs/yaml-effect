name: Compliance

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  compliance:
    name: YAML 1.2 Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup runtime
        id: runtime
        uses: savvy-web/silk-runtime-action@v1

      - name: Run compliance tests
        id: compliance
        run: |
          pnpm exec vitest run __test__/yaml-test-suite.e2e.test.ts --reporter=json --outputFile=/tmp/compliance-results.json --coverage.enabled=false 2>/dev/null || true

          node --input-type=module <<'SCRIPT'
          import { readFileSync, writeFileSync } from "node:fs";

          // Extract JSON from output (agent reporter may append non-JSON text)
          const rawText = readFileSync("/tmp/compliance-results.json", "utf-8");
          const jsonStart = rawText.indexOf("{");
          let depth = 0;
          let jsonEnd = jsonStart;
          for (let i = jsonStart; i < rawText.length; i++) {
            if (rawText[i] === "{") depth++;
            else if (rawText[i] === "}") { depth--; if (depth === 0) { jsonEnd = i + 1; break; } }
          }
          const raw = JSON.parse(rawText.slice(jsonStart, jsonEnd));

          // Compliance score from the yaml-test-suite e2e test file. The
          // skip map is empty (XFAIL: {}, SKIP_ASSERTIONS: {}), so every
          // assertion is a real pass/fail signal.
          const file = raw.testResults.find(r => r.name.includes("yaml-test-suite.e2e"));
          const results = file.assertionResults;
          const passing = results.filter(r => r.status === "passed").length;
          const total = results.length;
          const percentage = Math.floor((passing / total) * 100);

          function color(pct) {
            if (pct > 90) return "brightgreen";
            if (pct > 70) return "yellow";
            if (pct > 50) return "orange";
            return "red";
          }

          const data = {
            passing,
            total,
            percentage,
            color: color(percentage),
            lastUpdated: new Date().toISOString(),
          };

          // shields.io endpoint badge format
          const badge = {
            schemaVersion: 1,
            label: "YAML 1.2 compliance",
            message: `${percentage}%`,
            color: color(percentage),
          };

          writeFileSync("/tmp/compliance.json", JSON.stringify(data, null, 2) + "\n");
          writeFileSync("/tmp/badge.json", JSON.stringify(badge, null, 2) + "\n");
          console.log(`Compliance: ${passing}/${total} (${percentage}%)`);
          SCRIPT

      - name: Update badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create badges branch from current main HEAD so GitHub
          # doesn't show a "Compare & pull request" banner for it
          git checkout -B badges HEAD

          # Remove all tracked files, add badge data
          git rm -rf . 2>/dev/null || true
          git checkout HEAD -- .gitignore 2>/dev/null || true
          cp /tmp/compliance.json compliance.json
          cp /tmp/badge.json badge.json
          git add compliance.json badge.json
          git commit -m "chore: update compliance badge data"
          git push origin badges --force
